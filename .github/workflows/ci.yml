name: ci

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff format
        run: python -m ruff format --check .

      - name: Ruff lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy shelley

      - name: Compile
        run: python -m compileall -q bot.py shelley tests

      - name: Secret scan
        run: python -m pytest -q tests/test_repo.py::test_public_files_do_not_contain_private_data_or_old_logic tests/test_repo.py::test_runtime_private_files_are_not_committed

      - name: Tests
        run: python -m pytest -q

      - name: Docker build
        run: docker build .
