services:
  bot:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BOT_CONFIG_PATH: /app/config.json
      SHELLEY_DATABASE_URL: postgresql://shelley:${POSTGRES_PASSWORD:-change-me}@postgres:5432/shelley
    volumes:
      - ./config.json:/app/config.json:ro
      - ${SHELLEY_SSH_DIR:-./secrets/ssh}:/run/secrets/shelley-ssh:ro

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shelley
      POSTGRES_USER: shelley
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shelley -d shelley"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
